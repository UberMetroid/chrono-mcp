name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run tests
      run: |
        pytest tests/ -v
    
    - name: Verify data files
      run: |
        python -c "import json; json.load(open('data/extracted/chrono_master_complete.json'))"
        echo "Data files valid"

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: chronomcp:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test container
      run: |
        docker run -d --name test-chrono -p 5000:5000 chronomcp:latest
        sleep 5
        docker logs test-chrono
        docker stop test-chrono
        docker rm test-chrono

  docs:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate docs
      run: |
        ls -la docs/
        echo "Documentation validated"
