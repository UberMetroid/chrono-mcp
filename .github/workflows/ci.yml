name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run tests
      run: |
        pytest tests/ -v
    
    - name: Verify data files
      run: |
        python -c "import json; json.load(open('data/extracted/chrono_master_complete.json'))"
        echo "Data files valid"

  security:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Check Python dependencies for vulnerabilities
      run: |
        pip install safety
        safety check || true
    
    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r . -x ./tests,./data,./docs -f json -o bandit-report.json || true
        bandit -r . -x ./tests,./data,./docs || true
    
    - name: Run Semgrep static analysis
      uses: returntocorp/semgrep-action@v1
      with:
        config: auto

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: chronomcp:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'chronomcp:latest'
        format: 'json'
        output: 'trivy-report.json'
        severity: 'CRITICAL,HIGH'
    
    - name: Test container
      run: |
        docker run -d --name test-chrono -p 5000:5000 chronomcp:latest
        sleep 5
        docker logs test-chrono
        docker stop test-chrono
        docker rm test-chrono

  docs:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate docs
      run: |
        ls -la docs/
        echo "Documentation validated"
