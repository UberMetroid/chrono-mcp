version: '3.8'

services:
  # The main Crono MCP application
  chronomcp:
    build: .
    image: chrono-mcp:latest
    container_name: chrono-mcp
    ports:
      - "5000:5000"  # Web UI
      - "8080:8080"  # MCP Server
      - "8081:8081"  # Emulator TCP Hook
    volumes:
      - ./data:/app/data:Z
      # Uncomment during development to live-reload code
      # - ./mcp:/app/mcp
      # - ./lib:/app/lib
      # - ./app:/app/app
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=8080
      - FLASK_ENV=development
    restart: unless-stopped
    networks:
      - chrononet

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:latest
    container_name: chrono-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - chronomcp
    restart: unless-stopped
    networks:
      - chrononet

networks:
  chrononet:
    driver: bridge
